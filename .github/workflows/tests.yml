name: Tests

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  security:
    runs-on: ubuntu-22.04
    env:
      SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}

    steps:
    - name: Using branch ${{ github.ref }} for repository ${{ github.repository }}.
      uses: actions/checkout@v6

    - name: Setup Node.js
      uses: ./.github/actions/setup-node
      with:
        node-version: 22.x

    - name: Install dependencies
      uses: ./.github/actions/install-dependencies
      with:
        node-version: 22.x

    - name: Require Snyk token
      if: env.SNYK_TOKEN == '' && github.event_name != 'pull_request'
      run: |
        echo "SNYK_TOKEN is required for Snyk dependency scan"
        exit 1

    - name: Run Snyk dependency scan
      if: env.SNYK_TOKEN != ''
      uses: snyk/actions/node@master
      with:
        command: test
        args: --severity-threshold=high

  eslint:
    runs-on: ubuntu-22.04

    strategy:
      matrix:
        node-version: [ 20.x, 22.x ]

    steps:
    - name: Using branch ${{ github.ref }} for repository ${{ github.repository }}.
      uses: actions/checkout@v6

    - name: Setup Node.js
      uses: ./.github/actions/setup-node
      with:
        node-version: ${{ matrix.node-version }}

    - name: Install dependencies
      uses: ./.github/actions/install-dependencies
      with:
        node-version: ${{ matrix.node-version }}

    - name: Run eslint
      run: |
        yarn eslint

  tests:
    needs: eslint

    runs-on: ubuntu-22.04

    strategy:
      matrix:
        node-version: [ 20.x, 22.x ]

    steps:
    - name: Using branch ${{ github.ref }} for repository ${{ github.repository }}.
      uses: actions/checkout@v6

    - name: Setup Node.js
      uses: ./.github/actions/setup-node
      with:
        node-version: ${{ matrix.node-version }}

    - name: Install dependencies
      uses: ./.github/actions/install-dependencies
      with:
        node-version: ${{ matrix.node-version }}

    - name: Run tests
      uses: ./.github/actions/test
      with:
        artifact-name: coverage-${{ matrix.node-version }}
        codecov-token: ${{ secrets.CODECOV_TOKEN }}
